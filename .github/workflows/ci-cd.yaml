name: CI/CD car-service Pipeline

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

jobs:
    test:
        runs-on: ubuntu-latest
        steps: 
            - uses: "actions/checkout@v6"

            - name: set up node.js
              uses: "actions/setup-node@v6"
              with:
                node-version: "22"
            
            - name: "Install dependencies"
              run: npm install
              working-directory: ./car-service

            - name: "Run tests"
              run: npm test
              working-directory: ./car-service

    build: 
        needs: test
        if: github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        steps:
            - uses: "actions/checkout@v6"

            - name: "Login to Dockerhub"
              uses: docker/login-action@v4
              with:
                registry: ghcr.io
                username: ${{ github.actor }}
                password: ${{ secrets.GITHUB_TOKEN }}

            - name: "Build and push Docker image"
              uses: docker/build-push-action@v7
              with:
                context: ./car-service
                push: true
                tags: ghcr.io/${{ github.repository }}/car-service:latest

    deploy:
        needs: build
        if: github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        steps:
            - uses: "actions/checkout@v6"

            - name: "Deploy to AWS"
              uses: appleboy/ssh-action@v1
              with:
                host: ${{ secrets.AWS_HOST }}
                username: ubuntu
                key: ${{ secrets.AWS_SSH_KEY}}
                script: |
                    docker pull ghcr.io/${{ github.repository }}/tasks-api:latest
                    docker stop tasks-api || true
                    docker rm tasks-api || true
                    docker run -d --name tasks-api -p 3000:3000 ghcr.io/${{ github.repository }}/tasks-api:latest
                


            

    